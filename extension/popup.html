<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VirusTotal Scanner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>🛡️ VirusTotal Scanner</h1>
    </header>

    <section class="url-box">
      <span class="label">Current URL</span>
      <div id="current-url" class="url" title="">—</div>
    </section>

    <button id="scan-btn" class="scan-btn">Scan this page</button>

    <section id="status" class="status idle">
      <div class="status-icon" id="status-icon">•</div>
      <div class="status-text" id="status-text">Ready to scan</div>
    </section>

    <section id="stats" class="stats hidden">
      <div class="stat malicious"><span id="stat-malicious">0</span><label>Malicious</label></div>
      <div class="stat suspicious"><span id="stat-suspicious">0</span><label>Suspicious</label></div>
      <div class="stat harmless"><span id="stat-harmless">0</span><label>Harmless</label></div>
    </section>

    <footer>
      <small>Replace <code>YOUR_API_KEY_HERE</code> in <code>popup.js</code></small>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
